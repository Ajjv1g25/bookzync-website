# DigitalOcean App Platform spec.
# Optional but recommended — when you connect this repo, App Platform will
# pre-fill all settings from this file instead of asking you each time.
#
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/

name: bookzync-website
region: nyc

services:
  - name: web
    # Update these once you've connected your GitHub repo
    github:
      repo: YOUR_GITHUB_USERNAME/bookzync-website
      branch: main
      deploy_on_push: true

    # Build & run
    build_command: npm ci && npm run build
    run_command: npm start
    environment_slug: node-js
    source_dir: /

    # HTTP routing
    http_port: 3000
    routes:
      - path: /

    # Instance — start small, scale up later via the dashboard
    instance_size_slug: basic-xxs
    instance_count: 1

    # Health check — make sure the home page responds
    health_check:
      http_path: /
      initial_delay_seconds: 20
      period_seconds: 60
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3

    # Add real values via the App Platform dashboard, not here (these are PLACEHOLDERS).
    # Marking secrets as `SECRET` keeps them encrypted at rest.
    envs:
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        scope: RUN_AND_BUILD_TIME
        value: "1"
      # - key: ANTHROPIC_API_KEY
      #   scope: RUN_TIME
      #   type: SECRET
      # - key: NEXT_PUBLIC_SITE_URL
      #   scope: RUN_AND_BUILD_TIME
      #   value: https://bookzync.com
